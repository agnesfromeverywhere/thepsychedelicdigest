<script>
// ─────────────────────────────────────────────────────────────
// SIMPLE BUILT-IN BLOG SYSTEM
// Replaces /api/blog dependency
// Keeps your design logic simple and beginner-friendly
// ─────────────────────────────────────────────────────────────

const BLOG_POSTS = [
  {
    slug: "psychedelic-therapy-5-problems",
    title: "5 Urgent Failures Blocking Psychedelic Therapy Access in 2026",
    date: "2026-03-27",
    author: "The Psychedelic Digest",
    category: "Research",
    readTime: "8 min read",
    excerpt: "Reddit's psychedelic therapy communities point to the same 5 fractures every week. Here is what the data actually shows, and what still needs to be solved.",
    image: "/images/psychedelic-therapy-problems.jpg",
    content: `
      <h1>5 Urgent Failures Blocking Psychedelic Therapy Access in 2026</h1>

      <p>Psychedelic therapy is working. The clinical data is compelling, the cultural moment is real, and for the first time in decades, regulators in Australia, the Czech Republic, and parts of the United States are moving. And yet, for most people who need it, access remains a distant, expensive, and often dangerous proposition.</p>

      <p>The gap between promise and reality is still huge. Every week, patients, therapists, and curious newcomers all ask the same questions. Why is it still so hard to access treatment safely? Why is everything so expensive? Why does the conversation feel progressive while the systems still feel broken?</p>

      <h2>1. Legal progress is still fragmented</h2>
      <p>One country allows one substance in one narrow setting. Another allows research but not treatment. Another has retreat loopholes but no clinical structure. This creates confusion for patients and practitioners alike.</p>

      <h2>2. Cost is still shutting people out</h2>
      <p>Even where psychedelic-assisted therapy is legal, many people simply cannot afford it. When treatment costs rise into the thousands, access becomes a privilege instead of a meaningful public health option.</p>

      <h2>3. Too few trained professionals</h2>
      <p>The demand is growing much faster than the supply of experienced, ethical, and well-trained practitioners. This leads to long waitlists, uneven standards, and growing pressure on early providers.</p>

      <h2>4. Too much hype, not enough education</h2>
      <p>Psychedelics are often spoken about like a miracle solution. That creates unrealistic expectations and can push vulnerable people toward unsafe choices, especially online or outside clinical settings.</p>

      <h2>5. Integration is still underestimated</h2>
      <p>The session gets attention. The aftermath often does not. But integration is where insight becomes change. Without proper support, even powerful experiences can become confusing, destabilising, or wasted.</p>

      <h2>Final thought</h2>
      <p>The future of psychedelic therapy does look promising. But promise alone is not enough. If this field wants to mature, it needs stronger systems, safer access, better education, and real affordability.</p>
    `
  }
];

function formatBlogDate(dateStr) {
  try {
    return new Date(dateStr).toLocaleDateString('en-AU', {
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
  } catch (e) {
    return dateStr;
  }
}

function renderBlogList() {
  const grid = document.getElementById('blog-grid');
  const loading = document.getElementById('blog-loading');
  const error = document.getElementById('blog-error');
  const listView = document.getElementById('blog-list-view');
  const postView = document.getElementById('blog-post-view');

  if (!grid) return;

  if (loading) loading.style.display = 'none';
  if (error) error.style.display = 'none';
  if (listView) listView.style.display = 'block';
  if (postView) postView.style.display = 'none';

  if (!BLOG_POSTS.length) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:rgba(255,255,255,0.45);">
        No posts yet.
      </div>
    `;
    return;
  }

  grid.innerHTML = BLOG_POSTS.map(post => `
    <article class="blog-card" onclick="openBlogPost('${post.slug}')">
      <div class="blog-card-img-wrap">
        <img class="blog-card-img" src="${post.image}" alt="${post.title}" onerror="this.style.display='none'">
      </div>
      <div class="blog-card-body">
        <div class="blog-card-meta">
          <span class="blog-card-cat">${post.category}</span>
          <span>${formatBlogDate(post.date)}</span>
        </div>
        <div class="blog-card-title">${post.title}</div>
        <p style="color:rgba(255,255,255,0.58);font-size:0.88rem;line-height:1.7;">${post.excerpt}</p>
        <div class="blog-card-footer">
          <span>${post.readTime}</span>
          <span>Read article →</span>
        </div>
      </div>
    </article>
  `).join('');
}

function openBlogPost(slug) {
  const post = BLOG_POSTS.find(p => p.slug === slug);
  const content = document.getElementById('blog-post-content');
  const listView = document.getElementById('blog-list-view');
  const postView = document.getElementById('blog-post-view');

  if (!post || !content || !listView || !postView) return;

  content.innerHTML = `
    <div style="margin-bottom:24px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;font-size:0.78rem;color:rgba(255,255,255,0.45);">
        <span style="background:rgba(139,92,246,0.18);color:#a78bfa;border:1px solid rgba(139,92,246,0.25);padding:4px 10px;border-radius:999px;">${post.category}</span>
        <span>${formatBlogDate(post.date)}</span>
        <span>•</span>
        <span>${post.readTime}</span>
        <span>•</span>
        <span>${post.author}</span>
      </div>
      <img src="${post.image}" alt="${post.title}" style="width:100%;max-height:420px;object-fit:cover;border-radius:18px;border:1px solid rgba(255,255,255,0.08);margin-bottom:28px;" onerror="this.style.display='none'">
    </div>
    ${post.content}
  `;

  listView.style.display = 'none';
  postView.style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function closeBlogPost() {
  const listView = document.getElementById('blog-list-view');
  const postView = document.getElementById('blog-post-view');
  if (listView) listView.style.display = 'block';
  if (postView) postView.style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Optional helper so your nav can call this
function initBlogSection() {
  renderBlogList();
}
</script>
